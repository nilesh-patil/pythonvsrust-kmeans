title:       "K-Means, four ways"
description: "I benchmarked K-Means in pure Python, serial Rust, Rayon-parallel Rust, and scikit-learn — measuring runtime, memory, and clustering quality on my own laptop."
baseurl:     "/pythonvsrust-kmeans"
url:         ""

markdown:    kramdown
theme:       minima
permalink:   pretty

minima:
  skin: classic

defaults:
  - scope: { path: "" }
    values:
      layout: default

include:
  - wasm

exclude:
  - .pixi
  - target
  - data
  - results
  - notebooks
  - tests
  - specs
  - "*.py"
  - "*.toml"
  - "*.lock"
  - "*.rs"
  - src
