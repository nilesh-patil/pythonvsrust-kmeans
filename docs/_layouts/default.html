<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">

  <!-- Typography: Newsreader (body + headings) + JetBrains Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;500&display=swap">

  <!-- Math: KaTeX via CDN, auto-rendered after load -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
        integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+"
        crossorigin="anonymous">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav">
      <a href="{{ '/'            | relative_url }}">Overview</a>
      <a href="{{ '/algorithms/' | relative_url }}">Algorithms</a>
      <a href="{{ '/parallel/'   | relative_url }}">Parallelism</a>
      <a href="{{ '/benchmarks/' | relative_url }}">Benchmarks</a>
      <a href="{{ '/demo/'       | relative_url }}">Live demo</a>
      <a href="{{ '/about/'      | relative_url }}">About</a>
    </nav>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>
      A benchmarking notebook by Nilesh Patil.
      Source on <a href="https://github.com/nilesh-patil/pythonvsrust-kmeans">GitHub</a>.
      Set with Newsreader; built with Jekyll.
    </p>
  </footer>

  <!-- KaTeX auto-render: deferred so it never blocks first paint -->
  <script defer
          src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
          integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg"
          crossorigin="anonymous"></script>
  <script defer
          src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
          integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk"
          crossorigin="anonymous"
          onload="renderMathInElement(document.body, {
            delimiters: [
              { left: '$$',  right: '$$',  display: true  },
              { left: '\\[', right: '\\]', display: true  },
              { left: '\\(', right: '\\)', display: false }
            ],
            throwOnError: false
          });"></script>
</body>
</html>
