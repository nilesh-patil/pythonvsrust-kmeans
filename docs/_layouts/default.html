<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav">
      <a href="{{ '/'            | relative_url }}">Overview</a>
      <a href="{{ '/algorithms/' | relative_url }}">Algorithms</a>
      <a href="{{ '/parallel/'   | relative_url }}">Parallelism</a>
      <a href="{{ '/benchmarks/' | relative_url }}">Benchmarks</a>
      <a href="{{ '/demo/'       | relative_url }}">Live demo</a>
      <a href="{{ '/about/'      | relative_url }}">About</a>
    </nav>
  </header>

  <main class="site-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>Built with Jekyll · Source on <a href="https://github.com/nilesh-patil/pythonvsrust-kmeans">GitHub</a></p>
  </footer>
</body>
</html>
