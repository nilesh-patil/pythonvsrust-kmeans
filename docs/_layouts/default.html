<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">pythonvsrust-kmeans</a>
    <nav class="site-nav">
      <a href="{{ '/'            | relative_url }}">Overview</a>
      <a href="{{ '/algorithms/' | relative_url }}">Algorithms</a>
      <a href="{{ '/parallel/'   | relative_url }}">Parallelism</a>
      <a href="{{ '/benchmarks/' | relative_url }}">Benchmarks</a>
      <a href="{{ '/demo/'       | relative_url }}">Live demo</a>
      <a href="{{ '/about/'      | relative_url }}">About</a>
    </nav>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>
      Source on <a href="https://github.com/nilesh-patil/pythonvsrust-kmeans">GitHub</a>
      · Built with Jekyll
    </p>
  </footer>
</body>
</html>
