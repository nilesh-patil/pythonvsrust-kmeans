<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- paper field with a hairline rule, echoing the site frame -->
  <rect width="64" height="64" rx="8" fill="#fffff8"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="7.5" fill="none" stroke="#dcdcd4"/>
  <!-- three ink data points -->
  <circle cx="20" cy="22" r="4" fill="#151515"/>
  <circle cx="44" cy="20" r="4" fill="#151515"/>
  <circle cx="24" cy="44" r="4" fill="#151515"/>
  <!-- rust centroid: filled mark + crosshair -->
  <circle cx="41" cy="42" r="6" fill="#b7410e"/>
  <path d="M41 33v18M32 42h18" stroke="#b7410e" stroke-width="1.6" stroke-linecap="round"/>
</svg>
