<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Newsreader, Georgia, serif" fill="none">
  <!-- ============================================================
       Why D^2 seeding beats uniform random.
       Left  : random init drops both seeds in one blob -> a real
               blob is left unseeded and the dense blob is split.
       Right : D^2-weighted choice samples far from the first seed
               -> one centroid per blob.
       ============================================================ -->
  <rect x="0" y="0" width="960" height="380" fill="#fffff8"/>

  <!-- shared headings -->
  <text x="252" y="42" text-anchor="middle" font-style="italic" font-size="17" fill="#151515">uniform random</text>
  <text x="708" y="42" text-anchor="middle" font-style="italic" font-size="17" fill="#151515">D&#178;-weighted (k-means++)</text>

  <!-- divider rule between panels -->
  <line x1="480" y1="60" x2="480" y2="320" stroke="#dcdcd4" stroke-width="1"/>

  <!-- ================= LEFT PANEL: RANDOM ================= -->
  <g>
    <rect x="40" y="60" width="408" height="248" stroke="#dcdcd4" stroke-width="1"/>

    <!-- blob A (upper-left, dense) -->
    <g fill="#3d6b9e">
      <circle cx="118" cy="118" r="3.2"/><circle cx="142" cy="106" r="3.2"/>
      <circle cx="100" cy="140" r="3.2"/><circle cx="150" cy="138" r="3.2"/>
      <circle cx="126" cy="150" r="3.2"/><circle cx="108" cy="112" r="3.2"/>
      <circle cx="160" cy="120" r="3.2"/><circle cx="132" cy="128" r="3.2"/>
      <circle cx="116" cy="170" r="3.2"/><circle cx="148" cy="166" r="3.2"/>
    </g>
    <!-- blob B (lower-right, far) — left UNSEEDED -->
    <g fill="#3d6b9e">
      <circle cx="330" cy="226" r="3.2"/><circle cx="356" cy="214" r="3.2"/>
      <circle cx="312" cy="248" r="3.2"/><circle cx="366" cy="246" r="3.2"/>
      <circle cx="340" cy="258" r="3.2"/><circle cx="322" cy="220" r="3.2"/>
      <circle cx="374" cy="230" r="3.2"/><circle cx="348" cy="238" r="3.2"/>
      <circle cx="328" cy="278" r="3.2"/><circle cx="360" cy="272" r="3.2"/>
    </g>

    <!-- two seeds BOTH land in blob A -->
    <g stroke="#a32015" stroke-width="1.6">
      <line x1="112" y1="122" x2="124" y2="122"/><line x1="118" y1="116" x2="118" y2="128"/>
      <line x1="146" y1="150" x2="158" y2="150"/><line x1="152" y1="144" x2="152" y2="156"/>
    </g>
    <circle cx="118" cy="122" r="9" stroke="#a32015" stroke-width="1" fill="none"/>
    <circle cx="152" cy="150" r="9" stroke="#a32015" stroke-width="1" fill="none"/>

    <!-- the split that results: a dashed line bisecting the dense blob -->
    <path d="M 92 184 L 178 96" stroke="#a32015" stroke-width="1" stroke-dasharray="3 4"/>

    <!-- annotation: blob B unseeded -->
    <text x="344" y="160" text-anchor="middle" font-size="12.5" fill="#595959">no seed</text>
    <text x="344" y="176" text-anchor="middle" font-size="12.5" fill="#595959">reaches here</text>
    <g stroke="#a32015" stroke-width="1" fill="none">
      <path d="M 344 184 C 344 196, 344 198, 344 206"/>
      <path d="M 340 200 L 344 207 L 348 200"/>
    </g>

    <text x="244" y="332" text-anchor="middle" font-size="13" fill="#151515">two seeds share one blob; the dense blob gets split,</text>
    <text x="244" y="350" text-anchor="middle" font-size="13" fill="#151515">the far blob is never represented.</text>
  </g>

  <!-- ================= RIGHT PANEL: D^2 ================= -->
  <g>
    <rect x="512" y="60" width="408" height="248" stroke="#dcdcd4" stroke-width="1"/>

    <!-- blob A -->
    <g fill="#3d6b9e">
      <circle cx="590" cy="118" r="3.2"/><circle cx="614" cy="106" r="3.2"/>
      <circle cx="572" cy="140" r="3.2"/><circle cx="622" cy="138" r="3.2"/>
      <circle cx="598" cy="150" r="3.2"/><circle cx="580" cy="112" r="3.2"/>
      <circle cx="632" cy="120" r="3.2"/><circle cx="604" cy="128" r="3.2"/>
      <circle cx="588" cy="170" r="3.2"/><circle cx="620" cy="166" r="3.2"/>
    </g>
    <!-- blob B -->
    <g fill="#c98c1f">
      <circle cx="802" cy="226" r="3.2"/><circle cx="828" cy="214" r="3.2"/>
      <circle cx="784" cy="248" r="3.2"/><circle cx="838" cy="246" r="3.2"/>
      <circle cx="812" cy="258" r="3.2"/><circle cx="794" cy="220" r="3.2"/>
      <circle cx="846" cy="230" r="3.2"/><circle cx="820" cy="238" r="3.2"/>
      <circle cx="800" cy="278" r="3.2"/><circle cx="832" cy="272" r="3.2"/>
    </g>

    <!-- first seed in blob A -->
    <g stroke="#a32015" stroke-width="1.6">
      <line x1="584" y1="122" x2="596" y2="122"/><line x1="590" y1="116" x2="590" y2="128"/>
    </g>
    <circle cx="590" cy="122" r="9" stroke="#a32015" stroke-width="1" fill="none"/>
    <text x="590" y="98" text-anchor="middle" font-size="11.5" font-style="italic" fill="#595959">1st (uniform)</text>

    <!-- D^2 "reach": faint widening rings around the first seed -->
    <circle cx="590" cy="122" r="60"  stroke="#dcdcd4" stroke-width="0.8" fill="none"/>
    <circle cx="590" cy="122" r="110" stroke="#dcdcd4" stroke-width="0.8" fill="none"/>
    <circle cx="590" cy="122" r="165" stroke="#dcdcd4" stroke-width="0.8" fill="none"/>

    <!-- second seed jumps to the far blob (largest D^2) -->
    <g stroke="#a32015" stroke-width="1.6">
      <line x1="806" y1="240" x2="818" y2="240"/><line x1="812" y1="234" x2="812" y2="246"/>
    </g>
    <circle cx="812" cy="240" r="9" stroke="#a32015" stroke-width="1" fill="none"/>
    <text x="812" y="300" text-anchor="middle" font-size="11.5" font-style="italic" fill="#595959">2nd (far, large D&#178;)</text>

    <!-- thin accent arrow showing the jump -->
    <g stroke="#a32015" stroke-width="1" fill="none">
      <path d="M 612 142 C 690 200, 740 218, 794 236" stroke-dasharray="2 4"/>
      <path d="M 786 230 L 795 237 L 785 240"/>
    </g>

    <text x="716" y="332" text-anchor="middle" font-size="13" fill="#151515">sampling &#8733; D&#178; pulls the next seed toward the</text>
    <text x="716" y="350" text-anchor="middle" font-size="13" fill="#151515">empty region — one centroid per blob.</text>
  </g>
</svg>
